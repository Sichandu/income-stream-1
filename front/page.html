<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkDesi</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 48px 20px 32px;
    }

    .page-wrap {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      margin-bottom: 14px;
      border: 3px solid rgba(255,255,255,0.4);
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }

    .display-name {
      font-size: 22px;
      font-weight: 800;
      color: white;
      margin-bottom: 6px;
      text-align: center;
      text-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .bio {
      font-size: 14px;
      color: rgba(255,255,255,0.8);
      text-align: center;
      margin-bottom: 28px;
      line-height: 1.6;
      max-width: 300px;
    }

    .links-wrap { width: 100%; display: flex; flex-direction: column; gap: 10px; }

    .link-btn {
      width: 100%;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      text-align: center;
      background: rgba(255,255,255,0.2);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      cursor: pointer;
      text-decoration: none;
      display: block;
      transition: all 0.2s;
      backdrop-filter: blur(4px);
    }

    .link-btn:hover {
      background: rgba(255,255,255,0.35);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }

    .link-btn.whatsapp { background: #25D366; border-color: #25D366; }
    .link-btn.whatsapp:hover { background: #20b858; }
    .link-btn.upi { background: #6739b7; border-color: #6739b7; }
    .link-btn.upi:hover { background: #5a31a0; }

    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      text-align: center;
    }

    .footer a { color: rgba(255,255,255,0.5); text-decoration: none; }
    .footer a:hover { color: white; }

    /* LOADING */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      color: rgba(255,255,255,0.7);
      font-size: 14px;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* NOT FOUND */
    .not-found {
      text-align: center;
      color: white;
    }

    .not-found h2 { font-size: 28px; margin-bottom: 12px; }
    .not-found p { font-size: 15px; color: rgba(255,255,255,0.7); margin-bottom: 24px; }

    .btn-create {
      display: inline-block;
      background: white;
      color: #333;
      font-size: 14px;
      font-weight: 700;
      padding: 12px 28px;
      border-radius: 100px;
      text-decoration: none;
      transition: all 0.2s;
    }

    .btn-create:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
  </style>
</head>
<body>

<div class="page-wrap" id="page-wrap">
  <div class="loading">
    <div class="spinner"></div>
    <span>Loading...</span>
  </div>
</div>

<script>
  const API_BASE = "https://income-stream-1-1.onrender.com";

  const themes = [
    'linear-gradient(135deg,#667eea,#764ba2)',
    'linear-gradient(135deg,#f093fb,#f5576c)',
    'linear-gradient(135deg,#4facfe,#00f2fe)',
    'linear-gradient(135deg,#43e97b,#38f9d7)',
    'linear-gradient(135deg,#fa709a,#fee140)',
    'linear-gradient(135deg,#ff9a9e,#fecfef)',
    'linear-gradient(135deg,#a18cd1,#fbc2eb)',
    'linear-gradient(135deg,#ffecd2,#fcb69f)',
    'linear-gradient(135deg,#2d3436,#636e72)',
    'linear-gradient(135deg,#ff4d00,#ff8c00)',
  ];

  // Get username from URL: /page.html?u=priyamusic
  const params = new URLSearchParams(window.location.search);
  const username = params.get('u');

  async function loadPage() {
    const wrap = document.getElementById('page-wrap');

    if (!username) {
      showNotFound(wrap);
      return;
    }

    try {
      const res = await fetch(`${API_BASE}/page/${username}`);

      if (!res.ok) {
        showNotFound(wrap);
        return;
      }

      const data = await res.json();
      renderPage(wrap, data);

    } catch(e) {
      showNotFound(wrap);
    }
  }

  function renderPage(wrap, data) {
    // Set background
    document.body.style.background = themes[data.theme_index || 0];

    // Update page title
    document.title = `${data.name} | LinkDesi`;

    let html = `
      <div class="avatar">${data.emoji || '😊'}</div>
      <div class="display-name">${escHtml(data.name)}</div>
      <div class="bio">${escHtml(data.bio || '')}</div>
      <div class="links-wrap">
    `;

    // Regular links
    const links = data.links || [];
    links.forEach(link => {
      if (!link.label) return;
      html += `<a class="link-btn" href="${escHtml(link.url)}" target="_blank" rel="noopener">${escHtml(link.label)}</a>`;
    });

    // WhatsApp
    if (data.whatsapp) {
      const num = data.whatsapp.replace(/\D/g, '');
      html += `<a class="link-btn whatsapp" href="https://wa.me/91${num}" target="_blank">📱 WhatsApp Me</a>`;
    }

    // UPI
    if (data.upi_id) {
      html += `<a class="link-btn upi" href="upi://pay?pa=${encodeURIComponent(data.upi_id)}&pn=${encodeURIComponent(data.name)}">💸 Pay via UPI</a>`;
    }

    html += `</div>
      <div class="footer">
        <a href="index.html">Create your free LinkDesi page →</a>
      </div>
    `;

    wrap.innerHTML = html;
  }

  function showNotFound(wrap) {
    document.body.style.background = 'linear-gradient(135deg,#667eea,#764ba2)';
    wrap.innerHTML = `
      <div class="not-found">
        <h2>Page not found</h2>
        <p>This page doesn't exist or hasn't been activated yet.</p>
        <a href="index.html" class="btn-create">Create Your Page →</a>
      </div>
    `;
  }

  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadPage();
</script>
</body>
</html>
